body:
  text: 西天譯經三藏朝散大夫試鴻臚卿傳法大師臣施護奉詔譯爾時一切如來說無量功德大明呪主轉輪王一百八名即說讚曰歸命最上師一切世間主恆懷大慈悲顯揚大名稱十力大丈夫福德超三界具足一切相天人常恭敬攝受諸衆生與作大福聚復名大自在一切佛頂王轉一切呪輪成就正法句聖智善通達一切悉解脫恆為大主宰出過一切天為大禪定像平等視衆生具足無邊智無實無不實無一亦無二號曰大仙天世所甚希有本來寂滅相清淨而無垢善入無盡性廓然無怖畏不斷亦不破無想亦不空能捨於萬有不著如虛空妙色即空色善相為善瑞寂靜常決定善意生妙梵為彼天中像自在廣無邊功德無邊量心口難思議無等無等等真像廣無邊究竟無能勝無邊世界中一切皆恭敬一切呪像主此像未曾有善像難有像天眼及三眼真實三解脫實語實寂靜實法住實際思惟妙法身湛然常堅久無垢性決定風天與月天日光及妙意文字三六字一呪一字王一智一切智自在大自在梵天那羅延一佛一法相一天居一衆一定一相應一切世間中高談衆妙法以此神通光化光一切處大光威德力為一切天主一切佛法主一切法智主無盡功德聚是名一百八
